<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹스튜디오 비상장 데모</title>
  <style>
    :root{
      --bg:#f4f7fb; --panel:#fff; --panel2:#f8fafc; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary2:#1d4ed8; --dark:#101827; --green:#10b981; --red:#ef4444; --orange:#f59e0b; --purple:#7c3aed;
      --shadow:0 18px 46px rgba(15,23,42,.08); --radius:22px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
    button,input,textarea,select{font-family:inherit} button{cursor:pointer} a{text-decoration:none;color:inherit}
    .topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1240px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;letter-spacing:-.5px;white-space:nowrap;cursor:pointer}.logo{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:grid;place-items:center;color:#fff;font-weight:900;font-size:14px;box-shadow:0 10px 22px rgba(37,99,235,.25)}
    .nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.nav button,.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:14px;color:#374151;transition:.18s}.nav button:hover,.btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(15,23,42,.08)}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn.dark{background:#111827;border-color:#111827;color:#fff}.btn.danger{background:#fee2e2;border-color:#fecaca;color:#991b1b}.btn.green{background:#dcfce7;border-color:#bbf7d0;color:#166534}.btn.red{background:#fee2e2;border-color:#fecaca;color:#b91c1c}.btn.small{padding:7px 10px;font-size:12px}.btn.block{width:100%;justify-content:center}
    .container{max-width:1240px;margin:0 auto;padding:24px 18px 70px}.hero{background:linear-gradient(135deg,#111827,#1e3a8a 55%,#6d28d9);border-radius:30px;padding:34px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-70px;top:-90px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.13)}.hero h1{margin:0 0 12px;font-size:38px;letter-spacing:-1.5px;line-height:1.15}.hero p{margin:0;color:rgba(255,255,255,.82);font-size:16px;line-height:1.7;max-width:820px}.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}.hero .btn{border-color:rgba(255,255,255,.26)}
    .grid{display:grid;gap:18px}.grid.two{grid-template-columns:1.25fr .75fr}.grid.three{grid-template-columns:repeat(3,1fr)}.grid.four{grid-template-columns:repeat(4,1fr)}.section{margin-top:22px}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}.section h2{margin:0;font-size:22px;letter-spacing:-.7px}.section small{color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.mini-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;transition:.18s}.mini-card.click{cursor:pointer}.mini-card.click:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(15,23,42,.09)}
    .table-wrap{overflow:auto;border-radius:18px;border:1px solid var(--line)}.table{width:100%;border-collapse:collapse;background:#fff}.table th{text-align:left;color:var(--muted);font-size:12px;font-weight:900;border-bottom:1px solid var(--line);padding:11px 10px;white-space:nowrap;background:#f8fafc}.table td{border-bottom:1px solid #eef2f7;padding:12px 10px;font-size:14px;vertical-align:middle;white-space:nowrap}.table tr:last-child td{border-bottom:0}.table tbody tr:hover{background:#f8fbff}.table.clickable tbody tr{cursor:pointer}
    .company{display:flex;align-items:center;gap:10px}.avatar{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,#dbeafe,#ede9fe);display:grid;place-items:center;font-weight:900;color:#1d4ed8;flex:0 0 auto}.avatar.member{border-radius:50%;background:linear-gradient(135deg,#fef3c7,#dbeafe);color:#111827}.name{font-weight:900}.meta{font-size:12px;color:var(--muted);margin-top:3px}.muted{color:var(--muted)}
    .tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eef2ff;color:#3730a3}.tag.green{background:#dcfce7;color:#166534}.tag.red{background:#fee2e2;color:#991b1b}.tag.orange{background:#fef3c7;color:#92400e}.tag.gray{background:#f3f4f6;color:#4b5563}.tag.purple{background:#ede9fe;color:#5b21b6}.up{color:#ef4444;font-weight:900}.down{color:#2563eb;font-weight:900}.flat{color:#6b7280;font-weight:900}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:14px}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:900}.stat b{display:block;font-size:22px;margin-top:7px;letter-spacing:-.7px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;color:#374151}.tab.active{background:#111827;border-color:#111827;color:#fff}
    .toolbar{display:grid;grid-template-columns:1fr 150px 150px 110px;gap:10px;margin-bottom:14px}.field label{display:block;font-size:12px;color:#4b5563;font-weight:900;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fff;outline:none;font-size:14px}textarea{min-height:92px;resize:vertical;line-height:1.55}input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.25)}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}.split{display:flex;align-items:center;justify-content:space-between;gap:12px}.empty{border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;border-radius:18px;padding:24px;text-align:center;font-weight:900}
    .post{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:15px;transition:.18s}.post.click{cursor:pointer}.post.click:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(15,23,42,.08)}.post-title{font-weight:900;letter-spacing:-.3px}.post-body{color:var(--muted);font-size:13px;line-height:1.55;margin-top:6px}.list{display:grid;gap:10px}.comment{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;margin-top:10px}.comment .who{font-weight:900;font-size:13px}.comment .txt{font-size:14px;color:#374151;line-height:1.55;margin-top:5px}
    .detail-top{display:grid;grid-template-columns:1fr 370px;gap:18px}.price{font-size:36px;font-weight:900;letter-spacing:-1.2px;margin:10px 0 2px}.trade-box{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}.trade-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.trade-tabs button{border:1px solid var(--line);border-radius:14px;padding:12px;background:#f8fafc;font-weight:900}.trade-tabs button.active.buy{background:#fee2e2;color:#b91c1c;border-color:#fecaca}.trade-tabs button.active.sell{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}.orderbook{display:grid;gap:6px}.level{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;border-radius:10px;padding:7px 8px;background:#f8fafc}.level.ask{background:#fff1f2}.level.bid{background:#eff6ff}.portfolio-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#f8fafc}
    .admin-layout{display:grid;grid-template-columns:235px 1fr;gap:18px}.admin-menu{position:sticky;top:84px;align-self:start}.admin-menu button{width:100%;text-align:left;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px;font-weight:900;color:#374151}.admin-menu button.active{background:#111827;color:#fff;border-color:#111827}.admin-note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:18px;padding:14px;font-size:13px;line-height:1.5;margin-bottom:14px}
    .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;border-radius:16px;padding:13px 16px;box-shadow:0 18px 40px rgba(15,23,42,.24);z-index:100;display:none;font-weight:900}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:90;padding:18px}.modal-box{background:#fff;border-radius:24px;padding:24px;max-width:470px;width:100%;box-shadow:0 30px 80px rgba(15,23,42,.25)}.modal-box h3{margin:0 0 10px;font-size:22px}.modal-box p{margin:0;color:var(--muted);line-height:1.65}.mobile-only{display:none}
    @media(max-width:900px){.nav{display:none}.mobile-only{display:inline-flex}.grid.two,.grid.three,.grid.four,.detail-top,.admin-layout{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.hero{padding:25px 20px}.hero h1{font-size:29px}.container{padding:18px 14px 54px}.admin-menu{position:static;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.admin-menu button{margin:0}.hide-mobile{display:none}}
  </style>
</head>
<body>
<header class="topbar"><div class="top-inner"><div class="brand" onclick="go('home')"><div class="logo">웹</div><span>웹스튜디오</span></div><nav class="nav"><button onclick="go('home')">홈</button><button onclick="go('companies')">비상장 종목</button><button onclick="go('trade')">모의거래</button><button onclick="go('portfolio')">내 포트폴리오</button><button onclick="go('board')">토론방</button><button onclick="go('admin')">관리자</button><button class="btn primary" onclick="demoLogin()">로그인</button></nav><button class="btn dark mobile-only" onclick="go('trade')">거래</button></div></header>
<main id="root" class="container"></main>
<div class="modal" id="modal"><div class="modal-box"><h3>데모 안내</h3><p id="modalText"></p><div class="actions"><button class="btn primary" onclick="closeModal()">확인</button></div></div></div><div class="toast" id="toast"></div>
<script>
const STORAGE_KEY='webstudio_unlisted_demo_v1';
const PAGE_SIZE=25;
const today=()=>new Date().toISOString().slice(0,10);
const uid=(p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const money=n=>(Number(n)||0).toLocaleString('ko-KR')+'원';
const won=n=>(Number(n)||0).toLocaleString('ko-KR');
const num=n=>(Number(n)||0).toLocaleString('ko-KR');
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const pick=a=>a[Math.floor(Math.random()*a.length)];

function generateCompanies(count=320){
  const prefixes=['루미나','그린','바이오','넥스트','모빌','에코','파이낸스','클라우드','메디','스마트','로보','에너지','오션','시큐어','푸드','에듀','케어','딥','제로','하이퍼','플렉스','노바','블루','크레딧','페이','커머스','랩스','브릿지','픽셀','마이크로','데이터','인사이트'];
  const suffixes=['AI','랩스','테크','바이오','모빌리티','로보틱스','페이','클라우드','솔루션','헬스케어','에너지','마켓','스튜디오','시스템즈','네트웍스','파트너스','플랫폼','월드','브릿지','커넥트'];
  const cats=['AI/SaaS','바이오/헬스케어','핀테크','모빌리티','친환경/에너지','커머스','콘텐츠/미디어','로봇/제조','교육/HR','보안/데이터','푸드테크','물류/플랫폼'];
  const statuses=['거래가능','청약중','청약예정','상장예정','관심종목'];
  const descs=['기업용 자동화 솔루션을 제공하는 성장형 스타트업입니다.','소비자 플랫폼과 데이터 기반 서비스를 운영하는 비상장 기업입니다.','B2B 구독형 매출과 파트너 영업망을 확대 중인 기업입니다.','신규 시장 진입을 위해 기술 고도화와 제휴를 진행 중입니다.','모의 데모용 데이터이며 실제 투자 판단용 정보가 아닙니다.'];
  const arr=[]; const used=new Set();
  for(let i=1;i<=count;i++){
    let name; let guard=0;
    do{name=pick(prefixes)+pick(suffixes)+(Math.random()<.18?String(Math.floor(Math.random()*99)):''); guard++;}while(used.has(name)&&guard<20);
    used.add(name);
    const price=Math.round((3000+Math.random()*97000)/100)*100;
    const change=Number((Math.random()*34-12).toFixed(2));
    const qty=Math.floor(1000+Math.random()*260000);
    const orders=Math.floor(20+Math.random()*6200);
    arr.push({id:'c'+i,name,code:(name.replace(/[가-힣]/g,'').slice(0,3)||'PS')+String(i).padStart(3,'0'),category:pick(cats),status:pick(statuses),price,change,deadline:`2026-${String(5+Math.floor(Math.random()*7)).padStart(2,'0')}-${String(1+Math.floor(Math.random()*27)).padStart(2,'0')}`,orders,qty,amount:price*qty,logo:name.slice(0,1),desc:pick(descs),watch:Math.floor(100+Math.random()*90000),tradeCount:Math.floor(20+Math.random()*5000)});
  }
  return arr.sort((a,b)=>b.watch-a.watch);
}
function seedData(){
  const companies=generateCompanies(360);
  const members=[
    {id:'m1',nickname:'데모관리자',level:'ADMIN',role:'관리자',points:0,cash:100000000,avatar:'관',positions:{}},
    {id:'m2',nickname:'스톡헌터',level:'VIP',role:'일반회원',points:28400,cash:50000000,avatar:'스',positions:{}},
    {id:'m3',nickname:'청약고수',level:'GOLD',role:'일반회원',points:19200,cash:30000000,avatar:'청',positions:{}},
    {id:'m4',nickname:'초보투자자',level:'SILVER',role:'일반회원',points:7200,cash:10000000,avatar:'초',positions:{}}
  ];
  const posts=[
    {id:'p1',title:'오늘 거래가능 종목 중 관심 높은 곳은 어디인가요?',category:'종목토론',authorId:'m2',companyId:companies[0].id,content:'데모 기준으로 관심수와 거래량이 높은 종목들을 비교해보고 있습니다. 실제 투자 정보가 아닌 시연용 데이터입니다.',views:832,createdAt:'2026-05-20',comments:[{id:'cm1',authorId:'m3',text:'거래 체험까지 되니까 고객에게 보여주기 좋을 것 같습니다.',createdAt:'2026-05-20'}]},
    {id:'p2',title:'관리자에서 종목을 수백 개 넣어두면 훨씬 진짜 같습니다',category:'개선요청',authorId:'m3',companyId:companies[3].id,content:'처음 화면에 종목이 몇 개 없으면 장난감처럼 보입니다. 최소 수백 개는 있어야 플랫폼 느낌이 납니다.',views:514,createdAt:'2026-05-19',comments:[]},
    {id:'p3',title:'매수/매도는 실제 결제 없이 즉시체결 데모로 충분합니다',category:'자유게시판',authorId:'m4',companyId:companies[7].id,content:'가상잔고와 보유수량이 바뀌고 거래내역이 남으면 기능이 되는 것처럼 보여줄 수 있습니다.',views:248,createdAt:'2026-05-18',comments:[]}
  ];
  return {currentMemberId:'m2',companies,members,posts,trades:[],notices:[{title:'웹스튜디오 비상장 거래 데모',text:'본 화면의 종목과 가격은 모두 시연용 가상 데이터입니다.'},{title:'관리자 입력 가능',text:'종목, 게시글, 댓글, 가상회원, 거래내역을 관리할 수 있습니다.'}]};
}
let state=load(); let route='home'; let adminTab='dashboard'; let tradeSide='buy'; let companyPage=1; let tradePage=1; let editCompanyId=null; let selectedBoardCategory='전체';
let filters={q:'',cat:'전체',status:'전체',sort:'watch'};
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):seedData()}catch(e){return seedData()}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800)}
function modal(msg){document.getElementById('modalText').textContent=msg;document.getElementById('modal').style.display='flex'} function closeModal(){document.getElementById('modal').style.display='none'}
function demoLogin(){modal('실제 로그인 서버는 없지만, 데모에서는 상단 또는 관리자에서 선택한 가상회원 기준으로 잔고·보유수량·거래내역이 저장됩니다.');}
function go(r){route=r;location.hash=r;render();window.scrollTo({top:0,behavior:'smooth'});} window.addEventListener('hashchange',()=>{route=location.hash.replace('#','')||'home';render();});
function member(id=state.currentMemberId){return state.members.find(m=>m.id===id)||state.members[0]} function company(id){return state.companies.find(c=>c.id===id)}
function changeClass(v){return v>0?'up':v<0?'down':'flat'} function changeText(v){return v>0?'▲ '+v+'%':v<0?'▼ '+Math.abs(v)+'%':'-'}
function statusTag(s){const cls=s==='거래가능'?'green':s==='청약중'?'orange':s==='청약예정'?'purple':s==='상장예정'?'red':'gray';return `<span class="tag ${cls}">${esc(s)}</span>`}
function categories(){return ['전체',...new Set(state.companies.map(c=>c.category))]} function statuses(){return ['전체',...new Set(state.companies.map(c=>c.status))]}
function filteredCompanies(){let arr=[...state.companies]; const q=filters.q.trim().toLowerCase(); if(q)arr=arr.filter(c=>(c.name+c.code+c.category).toLowerCase().includes(q)); if(filters.cat!=='전체')arr=arr.filter(c=>c.category===filters.cat); if(filters.status!=='전체')arr=arr.filter(c=>c.status===filters.status); const sort=filters.sort; arr.sort((a,b)=>sort==='price'?b.price-a.price:sort==='change'?b.change-a.change:sort==='trade'?b.tradeCount-a.tradeCount:sort==='name'?a.name.localeCompare(b.name):b.watch-a.watch); return arr;}
function position(mem, companyId){return (mem.positions&&mem.positions[companyId])||{qty:0,avg:0}}
function portfolioValue(mem){return Object.entries(mem.positions||{}).reduce((sum,[cid,pos])=>{const c=company(cid);return sum+(c?c.price*pos.qty:0)},0)}
function totalAsset(mem){return (Number(mem.cash)||0)+portfolioValue(mem)}

function render(){route=location.hash.replace('#','')||route||'home'; if(route.startsWith('company:'))return renderCompanyDetail(route.split(':')[1]); if(route.startsWith('post:'))return renderPostDetail(route.split(':')[1]); if(route==='companies')return renderCompanies(); if(route==='trade')return renderTrade(); if(route==='portfolio')return renderPortfolio(); if(route==='board')return renderBoard(); if(route==='admin')return renderAdmin(); renderHome();}
function renderHome(){const m=member(); const top=[...state.companies].sort((a,b)=>b.watch-a.watch).slice(0,10); const movers=[...state.companies].sort((a,b)=>b.change-a.change).slice(0,6); const posts=[...state.posts].sort((a,b)=>b.views-a.views).slice(0,5); document.getElementById('root').innerHTML=`
<section class="hero"><h1>웹스튜디오 비상장 청약·모의거래 플랫폼 데모</h1><p>수백 개의 가상 비상장 종목, 가상회원, 게시글, 댓글, 관리자 입력 기능, 매수/매도 즉시체결, 잔고·보유수량·거래내역까지 포함한 영업용 프로토타입입니다.</p><div class="hero-actions"><button class="btn primary" onclick="go('trade')">모의거래 시작</button><button class="btn" onclick="go('companies')">${state.companies.length}개 종목 보기</button><button class="btn dark" onclick="go('admin')">관리자 페이지</button></div></section>
<section class="section grid four"><div class="card"><div class="stat"><span>전체 종목</span><b>${num(state.companies.length)}</b></div></div><div class="card"><div class="stat"><span>가상회원</span><b>${num(state.members.length)}</b></div></div><div class="card"><div class="stat"><span>내 가상잔고</span><b>${money(m.cash)}</b></div></div><div class="card"><div class="stat"><span>거래내역</span><b>${num(state.trades.length)}</b></div></div></section>
<section class="section grid two"><div class="card"><div class="section-head"><div><h2>관심도 TOP 종목</h2><small>관리자에서 자동 생성/수정 가능</small></div><button class="btn" onclick="go('companies')">전체보기</button></div>${companyTable(top)}</div><div class="card"><div class="section-head"><div><h2>급등 종목</h2><small>등락률 기준</small></div></div><div class="list">${movers.map(companyCard).join('')}</div></div></section>
<section class="section grid two"><div class="card"><div class="section-head"><div><h2>HOT 토론</h2><small>게시글·댓글도 관리자에서 입력</small></div><button class="btn" onclick="go('board')">토론방</button></div><div class="list">${posts.map(postItem).join('')}</div></div><div class="card"><div class="section-head"><div><h2>데모 공지</h2><small>고객 시연용 문구</small></div></div><div class="list">${state.notices.map(n=>`<div class="mini-card"><div class="post-title">${esc(n.title)}</div><div class="post-body">${esc(n.text)}</div></div>`).join('')}</div></div></section>`;}
function companyTable(rows){if(!rows.length)return '<div class="empty">종목이 없습니다.</div>'; return `<div class="table-wrap"><table class="table clickable"><thead><tr><th>종목</th><th>상태</th><th>기준가</th><th>등락</th><th>관심</th><th>거래</th></tr></thead><tbody>${rows.map(c=>`<tr onclick="go('company:${c.id}')"><td><div class="company"><div class="avatar">${esc(c.logo||c.name[0])}</div><div><div class="name">${esc(c.name)}</div><div class="meta">${esc(c.code)} · ${esc(c.category)}</div></div></div></td><td>${statusTag(c.status)}</td><td><b>${money(c.price)}</b></td><td class="${changeClass(c.change)}">${changeText(c.change)}</td><td>${num(c.watch)}</td><td>${num(c.tradeCount)}</td></tr>`).join('')}</tbody></table></div>`}
function companyCard(c){return `<div class="mini-card click" onclick="go('company:${c.id}')"><div class="split"><div class="company"><div class="avatar">${esc(c.logo||c.name[0])}</div><div><div class="name">${esc(c.name)}</div><div class="meta">${esc(c.category)} · ${esc(c.code)}</div></div></div>${statusTag(c.status)}</div><div class="price" style="font-size:24px">${money(c.price)} <span class="${changeClass(c.change)}" style="font-size:13px">${changeText(c.change)}</span></div><div class="meta">관심 ${num(c.watch)} · 거래 ${num(c.tradeCount)}건</div></div>`}
function postItem(p){const m=member(p.authorId), c=company(p.companyId); return `<div class="post click" onclick="go('post:${p.id}')"><div><div><span class="tag gray">${esc(p.category)}</span> ${c?`<span class="tag">${esc(c.name)}</span>`:''}</div><div class="post-title" style="margin-top:8px">${esc(p.title)}</div><div class="post-body">${esc(p.content).slice(0,90)}${p.content.length>90?'...':''}</div><div class="meta">${esc(m.nickname)} · 조회 ${num(p.views)} · 댓글 ${p.comments.length}</div></div><div class="avatar member">${esc(m.avatar||m.nickname[0])}</div></div>`}

function filterToolbar(){return `<div class="toolbar"><input placeholder="종목명, 코드, 카테고리 검색" value="${esc(filters.q)}" oninput="filters.q=this.value;companyPage=1;tradePage=1;render()"><select onchange="filters.cat=this.value;companyPage=1;tradePage=1;render()">${categories().map(x=>`<option ${filters.cat===x?'selected':''}>${esc(x)}</option>`).join('')}</select><select onchange="filters.status=this.value;companyPage=1;tradePage=1;render()">${statuses().map(x=>`<option ${filters.status===x?'selected':''}>${esc(x)}</option>`).join('')}</select><select onchange="filters.sort=this.value;companyPage=1;tradePage=1;render()"><option value="watch" ${filters.sort==='watch'?'selected':''}>관심순</option><option value="trade" ${filters.sort==='trade'?'selected':''}>거래순</option><option value="change" ${filters.sort==='change'?'selected':''}>등락순</option><option value="price" ${filters.sort==='price'?'selected':''}>가격순</option><option value="name" ${filters.sort==='name'?'selected':''}>이름순</option></select></div>`}
function renderCompanies(){const arr=filteredCompanies(); const pages=Math.max(1,Math.ceil(arr.length/PAGE_SIZE)); companyPage=Math.min(companyPage,pages); const rows=arr.slice((companyPage-1)*PAGE_SIZE,companyPage*PAGE_SIZE); document.getElementById('root').innerHTML=`<section class="section" style="margin-top:0"><div class="section-head"><div><h2>비상장 종목 ${num(arr.length)}개</h2><small>모의 데이터이지만 실제 플랫폼처럼 검색·필터·상세·거래가 가능합니다.</small></div><button class="btn dark" onclick="go('admin')">관리자 입력</button></div>${filterToolbar()}${companyTable(rows)}${pager('companyPage',companyPage,pages)}</section>`}
function pager(varName,page,pages){return `<div class="pager"><button class="btn small" onclick="${varName}=Math.max(1,${varName}-1);render()">이전</button><span class="tag gray">${page} / ${pages}</span><button class="btn small" onclick="${varName}=Math.min(${pages},${varName}+1);render()">다음</button></div>`}

function renderTrade(){const arr=filteredCompanies(); const pages=Math.max(1,Math.ceil(arr.length/PAGE_SIZE)); tradePage=Math.min(tradePage,pages); const rows=arr.slice((tradePage-1)*PAGE_SIZE,tradePage*PAGE_SIZE); const m=member(); document.getElementById('root').innerHTML=`<section class="section" style="margin-top:0"><div class="section-head"><div><h2>모의거래</h2><small>종목을 선택하면 상세페이지에서 매수/매도가 즉시체결됩니다.</small></div><div><span class="tag green">${esc(m.nickname)}</span> <span class="tag">잔고 ${money(m.cash)}</span></div></div>${filterToolbar()}${companyTable(rows)}${pager('tradePage',tradePage,pages)}</section>`}
function renderCompanyDetail(id){const c=company(id); if(!c){go('companies');return} const m=member(); const pos=position(m,c.id); const related=state.posts.filter(p=>p.companyId===id).slice(0,4); document.getElementById('root').innerHTML=`<button class="btn" onclick="go('companies')">← 목록으로</button><section class="section detail-top"><div class="card"><div class="company"><div class="avatar" style="width:60px;height:60px;font-size:22px">${esc(c.logo||c.name[0])}</div><div><h1 style="margin:0;font-size:31px;letter-spacing:-1px">${esc(c.name)}</h1><div class="meta">${esc(c.code)} · ${esc(c.category)} · ${statusTag(c.status)}</div></div></div><div class="price">${money(c.price)} <span class="${changeClass(c.change)}" style="font-size:18px">${changeText(c.change)}</span></div><p style="line-height:1.75;color:#374151">${esc(c.desc)}</p><div class="stat-row"><div class="stat"><span>전체 주문</span><b>${num(c.orders)}</b></div><div class="stat"><span>거래량</span><b>${num(c.tradeCount)}</b></div><div class="stat"><span>누적 금액</span><b>${money(c.amount)}</b></div><div class="stat"><span>마감/기준일</span><b style="font-size:17px">${esc(c.deadline)}</b></div></div><div class="section"><h2>호가창</h2><div class="orderbook" style="margin-top:10px">${orderBook(c).map(l=>`<div class="level ${l.side}"><span>${l.side==='ask'?'매도':'매수'}</span><b>${money(l.price)}</b><span>${num(l.qty)}주</span></div>`).join('')}</div></div><div class="section"><h2>관련 토론</h2><div class="list" style="margin-top:10px">${related.map(postItem).join('')||'<div class="empty">관련 토론이 없습니다.</div>'}</div></div></div><aside><div class="card"><div class="section-head"><div><h2>매수/매도</h2><small>가상잔고 기반 즉시체결</small></div></div>${memberSelect()}<br><div class="portfolio-card"><div class="split"><span class="muted">가상잔고</span><b>${money(m.cash)}</b></div><div class="split"><span class="muted">보유수량</span><b>${num(pos.qty)}주</b></div><div class="split"><span class="muted">평균단가</span><b>${money(pos.avg)}</b></div></div><br>${tradeForm(c,pos)}</div><div class="card" style="margin-top:18px"><h2>최근 체결</h2><br>${tradeList(state.trades.filter(t=>t.companyId===c.id).slice(0,8),false)}</div></aside></section>`; updateTradePreview();}
function memberSelect(){return `<div class="field"><label>현재 가상회원</label><select onchange="state.currentMemberId=this.value;save();render()">${state.members.map(m=>`<option value="${m.id}" ${state.currentMemberId===m.id?'selected':''}>${esc(m.nickname)} / 잔고 ${money(m.cash)}</option>`).join('')}</select></div>`}
function orderBook(c){let levels=[]; for(let i=5;i>=1;i--)levels.push({side:'ask',price:Math.round(c.price*(1+i*.006)/100)*100,qty:Math.floor(10+Math.random()*700)}); for(let i=1;i<=5;i++)levels.push({side:'bid',price:Math.max(100,Math.round(c.price*(1-i*.006)/100)*100),qty:Math.floor(10+Math.random()*850)}); return levels;}
function tradeForm(c,pos){return `<div class="trade-box"><div class="trade-tabs"><button class="${tradeSide==='buy'?'active buy':''}" onclick="tradeSide='buy';renderCompanyDetail('${c.id}')">매수</button><button class="${tradeSide==='sell'?'active sell':''}" onclick="tradeSide='sell';renderCompanyDetail('${c.id}')">매도</button></div><div class="form-grid" style="grid-template-columns:1fr"><div class="field"><label>주문가격</label><input id="tradePrice" type="number" value="${c.price}" oninput="updateTradePreview()"></div><div class="field"><label>수량</label><input id="tradeQty" type="number" value="10" min="1" oninput="updateTradePreview()"></div></div><div class="portfolio-card" style="margin-top:12px"><div class="split"><span>예상 주문금액</span><b id="tradeAmount">0원</b></div><div class="meta">수수료/세금은 데모에서 제외</div></div><div class="actions"><button class="btn ${tradeSide==='buy'?'red':'primary'} block" onclick="executeTrade('${c.id}')">${tradeSide==='buy'?'매수 즉시체결':'매도 즉시체결'}</button></div></div>`}
function updateTradePreview(){const p=+document.getElementById('tradePrice')?.value||0, q=+document.getElementById('tradeQty')?.value||0; const el=document.getElementById('tradeAmount'); if(el)el.textContent=money(p*q);}
function executeTrade(companyId){const c=company(companyId), m=member(); const price=Math.max(1,+document.getElementById('tradePrice').value||0), qty=Math.floor(+document.getElementById('tradeQty').value||0); if(!qty)return toast('수량을 입력하세요.'); const amount=price*qty; m.positions=m.positions||{}; const pos=position(m,companyId); if(tradeSide==='buy'){if(m.cash<amount)return modal('가상잔고가 부족합니다. 관리자에서 회원 잔고를 늘리거나 다른 회원을 선택하세요.'); const newQty=pos.qty+qty; const newAvg=Math.round(((pos.qty*pos.avg)+(qty*price))/newQty); m.cash-=amount; m.positions[companyId]={qty:newQty,avg:newAvg};}
else{if(pos.qty<qty)return modal('보유수량이 부족합니다. 먼저 매수하거나 수량을 줄여주세요.'); m.cash+=amount; const left=pos.qty-qty; if(left<=0)delete m.positions[companyId]; else m.positions[companyId]={qty:left,avg:pos.avg};}
c.price=price; c.tradeCount=(c.tradeCount||0)+qty; c.orders=(c.orders||0)+1; c.amount=(c.amount||0)+amount; c.change=Number((c.change+(Math.random()*1.2-.35)).toFixed(2)); state.trades.unshift({id:uid('t'),memberId:m.id,companyId,side:tradeSide,price,qty,amount,createdAt:new Date().toLocaleString('ko-KR')}); save(); toast(`${tradeSide==='buy'?'매수':'매도'} 체결 완료`); renderCompanyDetail(companyId);}
function tradeList(trades,showCompany=true){if(!trades.length)return '<div class="empty">거래내역이 없습니다.</div>'; return `<div class="table-wrap"><table class="table"><thead><tr>${showCompany?'<th>종목</th>':''}<th>구분</th><th>수량</th><th>가격</th><th>금액</th><th>회원</th></tr></thead><tbody>${trades.map(t=>{const c=company(t.companyId),m=member(t.memberId);return `<tr>${showCompany?`<td>${c?esc(c.name):'삭제종목'}</td>`:''}<td><span class="tag ${t.side==='buy'?'red':'green'}">${t.side==='buy'?'매수':'매도'}</span></td><td>${num(t.qty)}</td><td>${money(t.price)}</td><td>${money(t.amount)}</td><td>${esc(m.nickname)}</td></tr>`}).join('')}</tbody></table></div>`}
function renderPortfolio(){const m=member(); const rows=Object.entries(m.positions||{}).map(([cid,pos])=>({c:company(cid),pos})).filter(x=>x.c); document.getElementById('root').innerHTML=`<section class="section" style="margin-top:0"><div class="section-head"><div><h2>내 포트폴리오</h2><small>현재 선택된 가상회원 기준</small></div><div>${memberSelect()}</div></div><div class="grid four"><div class="card"><div class="stat"><span>총자산</span><b>${money(totalAsset(m))}</b></div></div><div class="card"><div class="stat"><span>가상잔고</span><b>${money(m.cash)}</b></div></div><div class="card"><div class="stat"><span>평가금액</span><b>${money(portfolioValue(m))}</b></div></div><div class="card"><div class="stat"><span>보유종목</span><b>${rows.length}</b></div></div></div><section class="section card"><h2>보유 종목</h2><br>${portfolioTable(rows)}</section><section class="section card"><h2>전체 거래내역</h2><br>${tradeList(state.trades.filter(t=>t.memberId===m.id),true)}</section></section>`}
function portfolioTable(rows){if(!rows.length)return '<div class="empty">아직 보유한 종목이 없습니다. 모의거래에서 매수를 진행해보세요.</div>'; return `<div class="table-wrap"><table class="table clickable"><thead><tr><th>종목</th><th>수량</th><th>평균단가</th><th>현재가</th><th>평가금액</th><th>손익</th></tr></thead><tbody>${rows.map(({c,pos})=>{const evalv=c.price*pos.qty, cost=pos.avg*pos.qty, profit=evalv-cost, rate=cost?((profit/cost)*100).toFixed(2):0;return `<tr onclick="go('company:${c.id}')"><td><div class="company"><div class="avatar">${esc(c.logo)}</div><div><div class="name">${esc(c.name)}</div><div class="meta">${esc(c.category)}</div></div></div></td><td>${num(pos.qty)}</td><td>${money(pos.avg)}</td><td>${money(c.price)}</td><td>${money(evalv)}</td><td class="${profit>=0?'up':'down'}">${profit>=0?'+':''}${money(profit)} (${rate}%)</td></tr>`}).join('')}</tbody></table></div>`}

function renderBoard(){const cats=['전체',...new Set(state.posts.map(p=>p.category))]; const posts=selectedBoardCategory==='전체'?state.posts:state.posts.filter(p=>p.category===selectedBoardCategory); document.getElementById('root').innerHTML=`<section class="section" style="margin-top:0"><div class="section-head"><div><h2>토론방</h2><small>가상회원이 작성한 게시글과 댓글</small></div><button class="btn dark" onclick="go('admin')">게시글 작성</button></div><div class="tabs">${cats.map(c=>`<button class="tab ${c===selectedBoardCategory?'active':''}" onclick="selectedBoardCategory='${c}';renderBoard()">${esc(c)}</button>`).join('')}</div><div class="list">${posts.map(postItem).join('')||'<div class="empty">게시글이 없습니다.</div>'}</div></section>`}
function renderPostDetail(id){const p=state.posts.find(x=>x.id===id); if(!p){go('board');return} p.views=(Number(p.views)||0)+1; save(); const m=member(p.authorId), c=company(p.companyId); document.getElementById('root').innerHTML=`<button class="btn" onclick="go('board')">← 토론방으로</button><section class="section grid two"><article class="card"><div>${c?`<span class="tag">${esc(c.name)}</span>`:''} <span class="tag gray">${esc(p.category)}</span></div><h1 style="font-size:30px;letter-spacing:-1px;margin:14px 0 8px">${esc(p.title)}</h1><div class="company"><div class="avatar member">${esc(m.avatar||m.nickname[0])}</div><div><div class="name">${esc(m.nickname)}</div><div class="meta">${esc(m.level)} · ${esc(p.createdAt)} · 조회 ${num(p.views)}</div></div></div><p style="font-size:16px;line-height:1.8;color:#374151;white-space:pre-line">${esc(p.content)}</p><hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><h2>댓글 ${p.comments.length}</h2><div>${p.comments.map(cm=>{const u=member(cm.authorId);return `<div class="comment"><div class="who">${esc(u.nickname)} <span class="meta">${esc(cm.createdAt)}</span></div><div class="txt">${esc(cm.text)}</div></div>`}).join('')||'<div class="empty">댓글이 없습니다.</div>'}</div></article><aside class="card"><h2>데모 댓글 작성</h2><div class="field"><label>작성 회원</label><select id="quickCommentMember">${state.members.map(x=>`<option value="${x.id}">${esc(x.nickname)} / ${esc(x.level)}</option>`).join('')}</select></div><br><div class="field"><label>댓글 내용</label><textarea id="quickCommentText" placeholder="댓글을 입력하세요."></textarea></div><div class="actions"><button class="btn primary" onclick="quickAddComment('${p.id}')">댓글 등록</button><button class="btn" onclick="go('admin')">관리자</button></div></aside></section>`}
function quickAddComment(postId){const p=state.posts.find(x=>x.id===postId); const text=document.getElementById('quickCommentText').value.trim(); if(!text)return toast('댓글 내용을 입력하세요.'); p.comments.push({id:uid('cm'),authorId:document.getElementById('quickCommentMember').value,text,createdAt:today()}); save(); toast('댓글 등록 완료'); renderPostDetail(postId);}

function renderAdmin(){document.getElementById('root').innerHTML=`<section class="admin-note"><b>관리자 데모 안내</b><br>서버/DB 없이 브라우저 localStorage에 저장됩니다. 고객 PC와 데이터를 공유하려면 입력 완료 후 이 데이터를 코드에 반영해서 다시 배포해야 합니다.</section><section class="admin-layout"><aside class="admin-menu">${[['dashboard','대시보드'],['companies','종목/청약 관리'],['posts','게시글 작성'],['comments','댓글 관리'],['members','가상회원/잔고'],['trades','거래내역'],['data','데이터 관리']].map(([k,v])=>`<button class="${adminTab===k?'active':''}" onclick="adminTab='${k}';renderAdmin()">${v}</button>`).join('')}</aside><div>${adminContent()}</div></section>`}
function adminContent(){return adminTab==='companies'?adminCompanies():adminTab==='posts'?adminPosts():adminTab==='comments'?adminComments():adminTab==='members'?adminMembers():adminTab==='trades'?adminTrades():adminTab==='data'?adminData():adminDashboard()}
function adminDashboard(){const m=member(); return `<div class="card"><div class="section-head"><div><h2>관리자 대시보드</h2><small>데모 데이터 현황</small></div></div><div class="stat-row"><div class="stat"><span>종목</span><b>${num(state.companies.length)}</b></div><div class="stat"><span>회원</span><b>${num(state.members.length)}</b></div><div class="stat"><span>게시글/댓글</span><b>${state.posts.length}/${state.posts.reduce((a,p)=>a+p.comments.length,0)}</b></div><div class="stat"><span>체결내역</span><b>${num(state.trades.length)}</b></div></div><div class="actions"><button class="btn primary" onclick="adminTab='companies';renderAdmin()">종목 관리</button><button class="btn" onclick="adminTab='members';renderAdmin()">회원/잔고 관리</button><button class="btn" onclick="go('trade')">거래 화면</button><button class="btn dark" onclick="go('home')">프론트 확인</button></div></div>`}
function field(label,id,value='',type='text'){return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(value)}"></div>`} function val(id){return document.getElementById(id)?.value?.trim()||''}
function adminCompanies(){const editing=state.companies.find(c=>c.id===editCompanyId), c=editing||{}; return `<div class="grid" style="gap:18px"><div class="card"><div class="section-head"><div><h2>${editing?'종목 수정':'종목 등록'}</h2><small>수백 개 자동생성 또는 직접 등록 가능</small></div></div><div class="form-grid">${field('회사명','coName',c.name||'')}${field('종목코드','coCode',c.code||'')}${field('카테고리','coCat',c.category||'')}${selectField('상태','coStatus',['거래가능','청약중','청약예정','상장예정','관심종목'],c.status||'거래가능')}${field('기준가','coPrice',c.price||10000,'number')}${field('등락률(%)','coChange',c.change||0,'number')}${field('기준일/마감일','coDeadline',c.deadline||today(),'date')}${field('로고 글자','coLogo',c.logo||'')}${field('전체 주문','coOrders',c.orders||0,'number')}${field('거래량','coTradeCount',c.tradeCount||0,'number')}${field('관심수','coWatch',c.watch||0,'number')}<div></div><div class="field" style="grid-column:1/-1"><label>회사 설명</label><textarea id="coDesc">${esc(c.desc||'')}</textarea></div></div><div class="actions"><button class="btn primary" onclick="saveCompany()">${editing?'수정 저장':'종목 등록'}</button>${editing?'<button class="btn" onclick="editCompanyId=null;renderAdmin()">수정 취소</button>':''}<button class="btn" onclick="addMockCompanies(100)">가상종목 100개 추가</button><button class="btn" onclick="addMockCompanies(300)">가상종목 300개 추가</button></div></div><div class="card"><div class="section-head"><div><h2>등록 종목 ${state.companies.length}개</h2><small>상위 50개만 관리자 표시에 노출</small></div></div>${companyTableAdmin()}</div></div>`}
function selectField(label,id,opts,selected){return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option ${selected===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`}
function saveCompany(){const obj={name:val('coName'),code:val('coCode'),category:val('coCat'),status:val('coStatus'),price:+val('coPrice'),change:+val('coChange'),deadline:val('coDeadline'),logo:val('coLogo')||val('coName').slice(0,1),orders:+val('coOrders'),tradeCount:+val('coTradeCount'),watch:+val('coWatch'),qty:+val('coTradeCount'),amount:(+val('coPrice'))*(+val('coTradeCount')),desc:val('coDesc')}; if(!obj.name)return toast('회사명을 입력하세요.'); if(editCompanyId){Object.assign(state.companies.find(c=>c.id===editCompanyId),obj);editCompanyId=null;toast('종목 수정 완료');}else{state.companies.unshift({id:uid('c'),...obj});toast('종목 등록 완료');} save();renderAdmin();}
function addMockCompanies(n){state.companies=[...generateCompanies(n).map(c=>({...c,id:uid('c')})),...state.companies]; save(); toast(`가상종목 ${n}개를 추가했습니다.`); renderAdmin();}
function companyTableAdmin(){const rows=state.companies.slice(0,50); return `<div class="table-wrap"><table class="table"><thead><tr><th>종목</th><th>상태</th><th>가격</th><th>관리</th></tr></thead><tbody>${rows.map(c=>`<tr><td><div class="company"><div class="avatar">${esc(c.logo)}</div><div><div class="name">${esc(c.name)}</div><div class="meta">${esc(c.category)} · ${esc(c.code)}</div></div></div></td><td>${statusTag(c.status)}</td><td>${money(c.price)}</td><td><button class="btn small" onclick="editCompanyId='${c.id}';renderAdmin()">수정</button> <button class="btn danger small" onclick="deleteCompany('${c.id}')">삭제</button></td></tr>`).join('')}</tbody></table></div>`}
function deleteCompany(id){if(!confirm('종목을 삭제할까요?'))return; state.companies=state.companies.filter(c=>c.id!==id); save(); toast('삭제 완료'); renderAdmin();}
function adminPosts(){return `<div class="grid" style="gap:18px"><div class="card"><h2>게시글 작성</h2><br><div class="form-grid">${field('제목','postTitle')}${selectField('카테고리','postCat',['종목토론','자유게시판','개선요청','공지사항'],'종목토론')}<div class="field"><label>작성자</label><select id="postAuthor">${state.members.map(m=>`<option value="${m.id}">${esc(m.nickname)}</option>`).join('')}</select></div><div class="field"><label>연결 종목</label><select id="postCompany"><option value="">선택 안 함</option>${state.companies.slice(0,250).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div><div class="field" style="grid-column:1/-1"><label>내용</label><textarea id="postContent"></textarea></div></div><div class="actions"><button class="btn primary" onclick="savePost()">게시글 등록</button><button class="btn" onclick="go('board')">토론방 확인</button></div></div><div class="card"><h2>최근 게시글</h2><br><div class="list">${state.posts.map(p=>`<div class="post"><div onclick="go('post:${p.id}')" style="flex:1"><div class="post-title">${esc(p.title)}</div><div class="meta">${esc(member(p.authorId).nickname)} · 댓글 ${p.comments.length} · 조회 ${num(p.views)}</div></div><button class="btn danger small" onclick="deletePost('${p.id}')">삭제</button></div>`).join('')||'<div class="empty">게시글 없음</div>'}</div></div></div>`}
function savePost(){const title=val('postTitle'),content=val('postContent'); if(!title||!content)return toast('제목과 내용을 입력하세요.'); state.posts.unshift({id:uid('p'),title,category:val('postCat'),authorId:val('postAuthor'),companyId:val('postCompany'),content,views:0,createdAt:today(),comments:[]}); save();toast('게시글 등록 완료');renderAdmin();}
function deletePost(id){if(!confirm('게시글 삭제?'))return; state.posts=state.posts.filter(p=>p.id!==id);save();renderAdmin();}
function adminComments(){return `<div class="card"><h2>댓글 등록</h2><br><div class="form-grid"><div class="field"><label>게시글</label><select id="cmPost">${state.posts.map(p=>`<option value="${p.id}">${esc(p.title)}</option>`).join('')}</select></div><div class="field"><label>작성자</label><select id="cmAuthor">${state.members.map(m=>`<option value="${m.id}">${esc(m.nickname)}</option>`).join('')}</select></div><div class="field" style="grid-column:1/-1"><label>댓글</label><textarea id="cmText"></textarea></div></div><div class="actions"><button class="btn primary" onclick="saveComment()">댓글 등록</button><button class="btn" onclick="go('board')">토론방 확인</button></div><hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><h2>최근 댓글</h2>${commentAdminList()}</div>`}
function saveComment(){const p=state.posts.find(x=>x.id===val('cmPost')); const text=val('cmText'); if(!p||!text)return toast('댓글 내용을 입력하세요.'); p.comments.push({id:uid('cm'),authorId:val('cmAuthor'),text,createdAt:today()});save();toast('댓글 등록 완료');renderAdmin();}
function commentAdminList(){let rows=[];state.posts.forEach(p=>p.comments.forEach(cm=>rows.push({p,cm}))); if(!rows.length)return '<div class="empty">댓글 없음</div>'; return `<div class="list">${rows.reverse().slice(0,40).map(({p,cm})=>`<div class="comment"><div class="who">${esc(member(cm.authorId).nickname)} <span class="meta">${esc(p.title)}</span></div><div class="txt">${esc(cm.text)}</div><div class="actions"><button class="btn danger small" onclick="deleteComment('${p.id}','${cm.id}')">삭제</button></div></div>`).join('')}</div>`}
function deleteComment(pid,cid){const p=state.posts.find(x=>x.id===pid); if(!p)return; p.comments=p.comments.filter(c=>c.id!==cid);save();renderAdmin();}
function adminMembers(){return `<div class="grid" style="gap:18px"><div class="card"><h2>가상회원 생성/잔고</h2><br><div class="form-grid">${field('닉네임','memNick')}${selectField('등급','memLevel',['BASIC','SILVER','GOLD','VIP','ADMIN'],'BASIC')}${field('가상잔고','memCash',10000000,'number')}${selectField('권한','memRole',['일반회원','관리자','운영자'],'일반회원')}</div><div class="actions"><button class="btn primary" onclick="saveMember()">회원 생성</button><button class="btn" onclick="generateMembers(20)">랜덤 20명</button><button class="btn" onclick="giveAllCash()">모든 회원 1억 충전</button></div></div><div class="card"><h2>회원 목록</h2><br>${memberList()}</div></div>`}
function saveMember(){const nickname=val('memNick'); if(!nickname)return toast('닉네임 입력'); state.members.unshift({id:uid('m'),nickname,level:val('memLevel'),role:val('memRole'),points:0,cash:+val('memCash'),avatar:nickname[0],positions:{},createdAt:today()});save();renderAdmin();}
function generateMembers(n){const a=['청약','비상장','성장주','개미','스마트','주식','프리','마켓','상장','미래'];const b=['고수','헌터','노트','리더','매니아','초보','분석가','탐험가','픽커','러너'];const levels=['BASIC','SILVER','GOLD','VIP'];for(let i=0;i<n;i++){const nickname=pick(a)+pick(b)+Math.floor(Math.random()*999);state.members.unshift({id:uid('m'),nickname,level:pick(levels),role:'일반회원',points:Math.floor(Math.random()*50000),cash:Math.floor(3000000+Math.random()*100000000),avatar:nickname[0],positions:{},createdAt:today()});}save();toast(`회원 ${n}명 생성`);renderAdmin();}
function giveAllCash(){state.members.forEach(m=>m.cash=100000000);save();toast('모든 회원 잔고를 1억으로 설정했습니다.');renderAdmin();}
function memberList(){return `<div class="table-wrap"><table class="table"><thead><tr><th>회원</th><th>등급</th><th>잔고</th><th>자산</th><th>관리</th></tr></thead><tbody>${state.members.map(m=>`<tr><td><div class="company"><div class="avatar member">${esc(m.avatar||m.nickname[0])}</div><div><div class="name">${esc(m.nickname)}</div><div class="meta">${esc(m.role)}</div></div></div></td><td><span class="tag">${esc(m.level)}</span></td><td>${money(m.cash)}</td><td>${money(totalAsset(m))}</td><td><button class="btn small" onclick="state.currentMemberId='${m.id}';save();go('portfolio')">보기</button> <button class="btn danger small" onclick="deleteMember('${m.id}')">삭제</button></td></tr>`).join('')}</tbody></table></div>`}
function deleteMember(id){if(state.members.length<=1)return toast('최소 1명 필요'); if(!confirm('회원 삭제?'))return; state.members=state.members.filter(m=>m.id!==id); if(state.currentMemberId===id)state.currentMemberId=state.members[0].id;save();renderAdmin();}
function adminTrades(){return `<div class="card"><div class="section-head"><div><h2>거래내역 관리</h2><small>전체 가상 체결 기록</small></div><button class="btn danger" onclick="clearTrades()">거래내역 초기화</button></div>${tradeList(state.trades,true)}</div>`}
function clearTrades(){if(!confirm('거래내역만 삭제할까요? 보유수량/잔고는 유지됩니다.'))return; state.trades=[];save();renderAdmin();}
function adminData(){return `<div class="card"><div class="section-head"><div><h2>데이터 관리</h2><small>시연 전 초기화 또는 JSON 복사</small></div></div><div class="actions"><button class="btn danger" onclick="resetData()">초기 데이터 복구</button><button class="btn" onclick="copyJSON()">현재 데이터 JSON 복사</button><button class="btn" onclick="downloadHTMLNote()">배포 안내</button></div><textarea id="jsonBox" style="margin-top:14px;min-height:360px;font-family:monospace">${esc(JSON.stringify(state,null,2))}</textarea></div>`}
function resetData(){if(!confirm('모든 데이터를 초기 상태로 되돌릴까요?'))return; state=seedData();save();toast('초기화 완료');render();}
function copyJSON(){const box=document.getElementById('jsonBox');box.select();document.execCommand('copy');toast('JSON 복사 완료');}
function downloadHTMLNote(){modal('이 코드는 index.html 하나로 배포됩니다. EdgeOne, Tiiny Host, Netlify 등에 index.html로 업로드하면 됩니다. 단, 고객 브라우저와 관리자 입력 데이터는 서로 공유되지 않습니다. 공유하려면 기본 데이터를 코드에 반영해야 합니다.');}
render();
</script>
</body>
</html>
