html,body{max-width:100%;overflow-x:hidden}
.topin{height:auto;min-height:68px;flex-wrap:wrap}

const NAMES={BTC:'Bitcoin',ETH:'Ethereum',XRP:'Ripple',SOL:'Solana',BNB:'BNB',DOGE:'Dogecoin',ADA:'Cardano',TRX:'TRON',TON:'Toncoin',LINK:'Chainlink',AVAX:'Avalanche',SUI:'Sui',BCH:'Bitcoin Cash',LTC:'Litecoin',DOT:'Polkadot',SHIB:'Shiba Inu',PEPE:'Pepe',HBAR:'Hedera',XLM:'Stellar',UNI:'Uniswap',APT:'Aptos',NEAR:'NEAR Protocol',ETC:'Ethereum Classic'};

function priceSeed(sym,i){if(sym==='BTC')return 93000000;if(sym==='ETH')return 4800000;if(sym==='XRP')return 3600;if(sym==='SOL')return 240000;if(sym==='BNB')return 860000;if(sym==='DOGE')return 245;if(sym==='SHIB')return .032;if(sym==='PEPE')return .018;return Math.round((500+Math.random()*120000)*(i%5+1)/10)*10+10}
function hist(base){let a=[],p=base;for(let i=0;i<120;i++){let o=p,c=Math.max(.0001,o*(1+(Math.random()-.5)*.018)),h=Math.max(o,c)*(1+Math.random()*.007),l=Math.min(o,c)*(1-Math.random()*.007);a.push({o,c,h,l,v:Math.random()*900+80,t:Date.now()-(120-i)*1000});p=c}return a}
function seed(){let markets=COINS.map((s,i)=>{let p=priceSeed(s,i);return{symbol:s,pair:s+'/KRW',name:NAMES[s]||s+' Token',price:p,change:+(Math.random()*10-4).toFixed(2),vol:Math.floor(Math.random()*90000000),status:'거래가능',history:hist(p),ticks:[]}});let now=Date.now();markets.forEach(m=>{m.ticks=m.history.slice(-12).map((x,idx)=>({t:now-(12-idx)*1000,p:x.c}))});return{activeUserId:'u1',markets,users:[{id:'u1',name:'테스트회원',role:'회원',cash:100000000,holdings:{BTC:{qty:.15,avg:90000000},ETH:{qty:1.2,avg:4300000}}},{id:'u2',name:'관리자계정',role:'관리자',cash:300000000,holdings:{}}],logs:[],positions:[],notices:[{id:UID('no'),title:'데모 안내',body:'실제 API가 아닌 모의 시세와 룰 기반 AI 점수로 작동합니다.'}],settings:{roundSec:60,speedSec:10,boxSec:15,roundPayout:1.92,speedPayout:1.75,boxPayout:1.65,maxLev:50,fee:.001,liqRate:.92},tape:[],gameVolumes:{spot:0,future:0,round:0,speed:0,box:0},liquidity:{},liveCycles:{},gameResults:{round:[],speed:[],box:[]}}
}
let S=load();initDefaults();function load(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch(e){return seed()}}function save(){localStorage.setItem(LS,JSON.stringify(S))}
function initDefaults(){S.liquidity=S.liquidity||{};S.lastAction=S.lastAction||null;S.liveCycles=S.liveCycles||{};S.gameResults=S.gameResults||{round:[],speed:[],box:[]};S.gameResults.round=S.gameResults.round||[];S.gameResults.speed=S.gameResults.speed||[];S.gameResults.box=S.gameResults.box||[];S.settings=S.settings||{};S.settings.roundSec=S.settings.roundSec||60;S.settings.speedSec=S.settings.speedSec||10;S.settings.boxSec=S.settings.boxSec||15;S.settings.roundPayout=S.settings.roundPayout||1.92;S.settings.speedPayout=S.settings.speedPayout||1.75;S.settings.boxPayout=S.settings.boxPayout||1.65;S.markets.forEach(m=>{if(!S.liquidity[m.symbol])S.liquidity[m.symbol]=makeLiquidity(m)});S.users.forEach(u=>{u.stakes=u.stakes||[];u.holdings=u.holdings||{}});if(!S.stakingProducts)S.stakingProducts=defaultStakingProducts();}

function defaultStakingProducts(){return[
{id:'sp_btc',symbol:'BTC',name:'BTC 프리미엄 예치',apr:4.8,lockDays:7,min:50000,status:'신청가능',badge:'안정형'},
{id:'sp_eth',symbol:'ETH',name:'ETH 플렉스 리워드',apr:3.4,lockDays:0,min:30000,status:'신청가능',badge:'자유형'},
{id:'sp_usdt',symbol:'USDT',name:'USDT 고정 수익',apr:8.2,lockDays:14,min:100000,status:'신청가능',badge:'고수익'},
{id:'sp_sol',symbol:'SOL',name:'SOL 부스트 스테이킹',apr:6.5,lockDays:3,min:50000,status:'신청가능',badge:'단기형'},
{id:'sp_xrp',symbol:'XRP',name:'XRP 데일리 보상',apr:2.8,lockDays:1,min:20000,status:'신청가능',badge:'저위험'}
]}
function makeLiquidity(m){let zero=Math.random()<.18;let sell=zero?0:Math.round((m.price*(3+Math.random()*38))/10000)*10000;let buy=Math.round((m.price*(3+Math.random()*42))/10000)*10000;return{sellValue:Math.max(0,sell),buyValue:Math.max(0,buy),updatedAt:Date.now()}}
function liq(sym=selected){let m=market(sym);S.liquidity=S.liquidity||{};if(!S.liquidity[m.symbol])S.liquidity[m.symbol]=makeLiquidity(m);return S.liquidity[m.symbol]}
function refreshLiquidity(){S.markets.forEach((m,i)=>{let l=liq(m.symbol);if(Math.random()<.33){let swing=(Math.random()-.43)*(m.price*(i<5?2.2:1.2));l.sellValue=Math.max(0,Math.round((l.sellValue+swing)/10000)*10000);if(Math.random()<.05)l.sellValue=0;if(l.sellValue===0&&Math.random()<.18)l.sellValue=Math.round((m.price*(2+Math.random()*18))/10000)*10000;}if(Math.random()<.33){let swing=(Math.random()-.48)*(m.price*(i<5?2.4:1.4));l.buyValue=Math.max(0,Math.round((l.buyValue+swing)/10000)*10000);if(l.buyValue===0&&Math.random()<.2)l.buyValue=Math.round((m.price*(2+Math.random()*18))/10000)*10000;}l.updatedAt=Date.now();});}
function canTake(side,sym=selected){let l=liq(sym);if(side==='BUY'||side==='LONG')return l.sellValue>0;if(side==='SELL'||side==='SHORT')return l.buyValue>0;return true}
function liquidityLimit(side,sym=selected){let l=liq(sym);return (side==='BUY'||side==='LONG')?l.sellValue:(side==='SELL'||side==='SHORT')?l.buyValue:Infinity}
function useLiquidity(side,amount,sym=selected){let l=liq(sym);if(side==='BUY'||side==='LONG')l.sellValue=Math.max(0,l.sellValue-amount);if(side==='SELL'||side==='SHORT')l.buyValue=Math.max(0,l.buyValue-amount);l.updatedAt=Date.now();}
function amountDefaultFor(side){let u=user();let v=liquidityLimit(side);if(!isFinite(v))v=1000000;return Math.max(0,Math.floor(Math.min(v,u.cash,1000000)));}
function cycleSec(k){return k==='round'?S.settings.roundSec:k==='speed'?S.settings.speedSec:S.settings.boxSec}
function cycleTitle(k){return{round:'회차 상승/하락',speed:'10초 스피드',box:'변동성 박스'}[k]||k}
function startCycle(k,sym=selected){let m=market(sym),sec=cycleSec(k);return{kind:k,symbol:sym,start:m.price,current:m.price,startAt:Date.now(),endAt:Date.now()+sec*1000,breached:false,lower:m.price*.9955,upper:m.price*1.0045}}
function liveCycle(k,sym=selected){S.liveCycles[k]=S.liveCycles[k]||{};if(!S.liveCycles[k][sym])S.liveCycles[k][sym]=startCycle(k,sym);return S.liveCycles[k][sym]}
function updateLiveGames(){['round','speed','box'].forEach(k=>{let c=liveCycle(k,selected),m=market(c.symbol);c.current=m.price;if(k==='box'&&(m.price<c.lower||m.price>c.upper))c.breached=true;if(Date.now()>=c.endAt){let outcome=k==='box'?(c.breached?'박스이탈':'박스유지'):(m.price>=c.start?'상승':'하락');let rec={time:new Date().toLocaleTimeString('ko-KR'),symbol:c.symbol,start:c.start,end:m.price,outcome,kind:k};S.gameResults[k].unshift(rec);if(S.gameResults[k].length>18)S.gameResults[k].pop();S.liveCycles[k][c.symbol]=startCycle(k,c.symbol);}});}
function user(){return S.users.find(u=>u.id===S.activeUserId)||S.users[0]}function market(sym=selected){return S.markets.find(m=>m.symbol===sym)||S.markets[0]}function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}function actionHtml(){if(!S.lastAction)return '';let cls=S.lastAction.type||'green';return `<div class="confirmbox ${cls}"><b>${esc(S.lastAction.title||'처리 결과')}</b><div class="meta">${esc(S.lastAction.msg||'')} · ${esc(S.lastAction.time||'')}</div></div>`}function actionNotice(title,msg,type='green'){S.lastAction={title,msg,type,time:new Date().toLocaleTimeString('ko-KR')};toast(title);let html=actionHtml();['actionBanner','modalStatus'].forEach(id=>{let el=document.getElementById(id);if(el)el.innerHTML=html});save()}

function aiScore(sym=selected){let m=market(sym),now=Date.now();let ticks=(m.ticks||[]).filter(x=>now-x.t<=10000);if(ticks.length<2)return 50;let first=ticks[0].p,last=ticks[ticks.length-1].p;let pct=(last-first)/first;let ups=0;for(let i=1;i<ticks.length;i++)if(ticks[i].p>ticks[i-1].p)ups++;let trend=(ups/Math.max(1,ticks.length-1)-.5)*24;let recent=(ticks.slice(-3).at(-1).p-ticks.slice(-3)[0].p)/ticks.slice(-3)[0].p*900;let score=50+pct*1700+trend+recent;return Math.round(clamp(score,0,100))}
function aiDirection(sym=selected){let s=aiScore(sym);return s>=55?'UP':s<=45?'DOWN':'NEUTRAL'}
function tick(){S.markets.forEach((m,i)=>{let factor=(Math.random()-.495)*(i<2?.0028:.007);let old=m.price;m.price=Math.max(.000001,m.price*(1+factor));m.change=+(((m.price-(m.history[0]?.o||old))/(m.history[0]?.o||old))*100).toFixed(2);m.vol+=Math.floor(Math.random()*1200);let last=m.history[m.history.length-1];if(last){last.c=m.price;last.h=Math.max(last.h,m.price);last.l=Math.min(last.l,m.price);last.v+=Math.random()*80;if(Math.random()<.18){m.history.push({o:last.c,c:m.price,h:m.price,l:m.price,v:Math.random()*600+60,t:Date.now()});if(m.history.length>160)m.history.shift()}}m.ticks=m.ticks||[];m.ticks.push({t:Date.now(),p:m.price});m.ticks=m.ticks.filter(x=>Date.now()-x.t<=12000)});genTape();refreshLiquidity();updateLiveGames();settleGames();settleFuturesRisk();if(route==='exchange'){drawChart();softExchangeNumbers()}else if(route==='home'){softHomeMarketNumbers()}topSync();save()}setInterval(tick,1000);
function genTape(){let m=market(),side=Math.random()>.5?'매수':'매도',amount=Math.floor(50000+Math.random()*5000000);S.tape.unshift({id:UID('tp'),time:new Date().toLocaleTimeString('ko-KR'),symbol:m.symbol,side,price:m.price,amount});if(S.tape.length>45)S.tape.pop();['spot','future','round','speed','box'].forEach(k=>S.gameVolumes[k]+=Math.floor(Math.random()*1800000+50000))}
function updateCash(delta){let u=user();u.cash=Math.max(0,(+u.cash||0)+delta)}

function render(){if(sessionStorage.getItem('wsdemo')!=='ok')return;nav();topSync();route=location.hash.replace('#','')||route||'home';if(route==='exchange')return renderExchange();if(route==='staking')return renderStaking();if(route==='history')return renderHistory();if(route==='admin')return renderAdmin();renderHome()}

function softHomeMarketNumbers(){
  document.querySelectorAll('.marketTable tbody tr[data-symbol]').forEach(tr=>{
    let m=market(tr.dataset.symbol); if(!m) return;
    let price=tr.querySelector('.hm-price'); if(price) price.textContent=N(m.price);
    let ch=tr.querySelector('.hm-change'); if(ch){ch.textContent=(m.change>=0?'+':'')+m.change+'%'; ch.className='hm-change '+(m.change>=0?'up':'down');}
    let vol=tr.querySelector('.hm-vol'); if(vol) vol.textContent=N(m.vol);
    let sc=tr.querySelector('.hm-score'); if(sc){let a=aiScore(m.symbol); sc.textContent=a+'점'; sc.className='hm-score pill '+(a>=55?'green':a<=45?'red':'gray');}
  });
}

v class="split"><span class="muted">${m.symbol} 보유</span><b id="coinSide">${N((u.holdings[m.symbol]?.qty)||0)}</b></div></aside></section><section class="section belowgrid"><div class="card"><h3>호가</h3><div class="orderbook" id="book"></div></div><div class="card"><h3>게임별 거래량</h3><div id="volBox"></div></div><div class="card"><h3>최근 체결</h3><div class="tape" id="tapeBox"></div></div><div class="card"><h3>미니게임 실시간</h3><div id="liveGameBox"></div></div></section>`;drawChart();softExchangeNumbers()}
function gameCards(){let l=liq(),sell=l.sellValue,buy=l.buyValue;let basis=market().pair;let a=[['spot','현물 매수/매도',`${basis} 기준 · 매수는 매도 대기금액이 있을 때만 가능합니다.`,sell>0?`매수가능 ${KRW(sell)}`:'매수불가 · 매도분 0원'],['future','마진/선물 레버리지',`${basis} 기준 · Long은 매도분, Short는 매수분이 있어야 진입됩니다.`,(sell>0||buy>0)?`Long ${KRW(sell)} / Short ${KRW(buy)}`:'진입불가'],['round','회차 상승/하락',`${basis} 기준 · ${S.settings.roundSec}초 후 상승/하락 결과를 맞춥니다.`,'실시간 판정표 아래 표시'],['speed','10초 스피드',`${basis} 기준 · 10초 후 방향을 맞추는 빠른 게임입니다.`,'실시간 판정표 아래 표시'],['box','변동성 박스',`${basis} 기준 · 가격이 박스 안에 머물지 이탈할지 맞춥니다.`,'실시간 판정표 아래 표시']];return a.map(x=>`<div class="gamecard ${x[0]==='spot'&&sell<=0?'disabled':''}" onclick="openGameModal('${x[0]}')"><h3>${x[1]}</h3><p>${x[2]}</p><div class="liq">${x[3]}</div></div>`).join('')}
function drawChart(){let c=document.getElementById('chart');if(!c)return;let m=market(),data=m.history.slice(-100);let r=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;c.width=r.width*dpr;c.height=r.height*dpr;let ctx=c.getContext('2d');ctx.scale(dpr,dpr);let w=r.width,h=r.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);let isSmall=w<520;let padL=isSmall?18:42,padR=isSmall?8:72,padT=isSmall?12:18,padB=isSmall?34:64,plotW=w-padL-padR,plotH=h-padT-padB,volH=isSmall?30:48;let hi=Math.max(...data.map(x=>x.h)),lo=Math.min(...data.map(x=>x.l));ctx.strokeStyle='#e7edf7';ctx.lineWidth=1;ctx.font='11px Arial';ctx.fillStyle='#7b8798';for(let i=0;i<=6;i++){let y=padT+i*plotH/6;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();let val=hi-(hi-lo)*i/6;let lab=isSmall?N(val).replace(/\.\d+$/,'').slice(0,7):N(val);ctx.textAlign=isSmall?'right':'left';ctx.fillText(lab,isSmall?w-padR-4:w-padR+8,y+4);ctx.textAlign='left'}for(let i=0;i<=8;i++){let x=padL+i*plotW/8;ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,padT+plotH);ctx.stroke()}let yv=v=>padT+(hi-v)/(hi-lo||1)*plotH;let cw=Math.max(3,plotW/data.length*.58);let maxVol=Math.max(...data.map(x=>x.v));data.forEach((d,i)=>{let x=padL+i*plotW/data.length+plotW/data.length*.22;let up=d.c>=d.o;ctx.strokeStyle=up?'#ef4444':'#2563eb';ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();ctx.moveTo(x+cw/2,yv(d.h));ctx.lineTo(x+cw/2,yv(d.l));ctx.stroke();let oy=yv(d.o),cy=yv(d.c);ctx.fillRect(x,Math.min(oy,cy),cw,Math.max(2,Math.abs(cy-oy)));ctx.globalAlpha=.25;ctx.fillRect(x,h-padB+volH-(d.v/maxVol)*volH,cw,(d.v/maxVol)*volH);ctx.globalAlpha=1});drawMA(ctx,data,7,padL,plotW,yv,'#10b981');drawMA(ctx,data,25,padL,plotW,yv,'#f59e0b');let py=yv(m.price);ctx.strokeStyle='#111827';ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(w-padR,py);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#111827';let labelW=isSmall?54:68;let labelX=isSmall?Math.max(padL,w-padR-labelW+2):w-padR+2;ctx.fillRect(labelX,py-10,labelW,20);ctx.fillStyle='#fff';ctx.font=(isSmall?'9px':'11px')+' Arial';ctx.fillText(N(m.price).slice(0,isSmall?8:12),labelX+5,py+4);ctx.fillStyle='#10b981';ctx.fillText('MA7',padL+8,padT+14);ctx.fillStyle='#f59e0b';ctx.fillText('MA25',padL+46,padT+14);c.onmousemove=e=>{let tip=document.getElementById('tip');let rect=c.getBoundingClientRect();let x=e.clientX-rect.left;let idx=Math.floor((x-padL)/plotW*data.length);let d=data[idx];if(!d){tip.style.display='none';return}tip.style.display='block';tip.style.left=Math.min(w-170,x+12)+'px';tip.style.top='14px';tip.innerHTML=`시가 ${N(d.o)}<br>고가 ${N(d.h)}<br>저가 ${N(d.l)}<br>종가 ${N(d.c)}<br>거래량 ${N(d.v)}`};c.onmouseleave=()=>{let t=document.getElementById('tip');if(t)t.style.display='none'}}
function drawMA(ctx,data,n,padL,plotW,yv,color){ctx.strokeStyle=color;ctx.lineWidth=1.6;ctx.beginPath();let started=false;data.forEach((d,i)=>{if(i<n)return;let avg=data.slice(i-n,i).reduce((a,x)=>a+x.c,0)/n;let x=padL+i*plotW/data.length+plotW/data.length*.5,y=yv(avg);if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y)});ctx.stroke()}
function softExchangeNumbers(){let m=market(),u=user(),score=aiScore();let set=(id,html)=>{let el=document.getElementById(id);if(el)el.innerHTML=html};set('priceNow',N(m.price));set('scoreText',score+'점 · '+aiDirection());let sc=document.getElementById('scoreCircle');if(sc){sc.style.setProperty('--score',score);sc.querySelector('span').textContent=score}set('cashSide',KRW(u.cash));set('coinSide',N(u.holdings[m.symbol]?.qty||0));renderBook();renderVolumes();renderTape();renderLiveGames();let ab=document.getElementById('actionBanner');if(ab)ab.innerHTML=actionHtml();}

function renderLiveGames(){let box=document.getElementById('liveGameBox');if(!box)return;updateLiveGames();let html=['round','speed','box'].map(k=>{let c=liveCycle(k),m=market(c.symbol),remain=Math.max(0,Math.ceil((c.endAt-Date.now())/1000));let live=k==='box'?(c.breached?'현재 박스 이탈':'현재 박스 안'):(m.price>=c.start?'현재 상승':'현재 하락');let resultRows=(S.gameResults[k]||[]).slice(0,3).map(r=>`<div class="miniresult"><span>${r.time}</span><b class="${r.outcome.includes('상승')||r.outcome.includes('유지')?'up':'down'}">${r.outcome}</b><span>${N(r.end)}</span></div>`).join('')||'<div class="meta">아직 완료된 판정 없음</div>';return `<div class="liveitem"><div class="split"><b>${cycleTitle(k)} · ${c.symbol}</b><span class="pill ${live.includes('상승')||live.includes('유지')?'green':'red'}">${live}</span></div><div class="meta">남은시간 ${remain}초 · 시작 ${N(c.start)} · 현재 ${N(m.price)}</div><div style="margin-top:8px">${resultRows}</div></div>`}).join('');box.innerHTML=html}
function openGameModal(type){openGame=type;let m=market(),u=user(),score=aiScore(),l=liq();let title={spot:'현물 매수/매도',future:'마진/선물 레버리지',round:'회차 상승/하락',speed:'10초 스피드',box:'변동성 박스'}[type];let common=`<div class="split"><div><h2>${title}</h2><div class="meta">${m.pair} · 현재가 ${N(m.price)} · AI ${score}점(${aiDirection()})</div></div></div><div class="confirmbox info"><b>기준 코인: ${m.pair}</b><div class="meta">BTC 고정이 아니라 현재 거래소 차트에서 선택한 코인 기준입니다. 다른 코인을 선택하면 해당 코인 기준으로 게임이 실행됩니다.</div></div><div id="modalStatus">${actionHtml()}</div><hr style="border:0;border-top:1px solid var(--line);margin:14px 0">`;let liqInfo=`<div class="liquiditybox"><div class="split"><span>현재 매도 대기금액</span><b>${KRW(l.sellValue)}</b></div><div class="split"><span>현재 매수 대기금액</span><b>${KRW(l.buyValue)}</b></div><div class="meta">매수/Long은 매도분이 있어야 하고, 매도/Short는 매수분이 있어야 체결됩니다.</div></div>`;let body='';if(type==='spot'){let def=amountDefaultFor('BUY');body=`${common}${liqInfo}<div class="field"><label>참여금 / 주문금액</label><input id="gAmount" type="number" value="${def}"></div><div class="actions"><button class="btn primary" ${l.sellValue<=0?'disabled':''} onclick="execSpot(false,'BUY')">매수 실행</button><button class="btn red" ${l.buyValue<=0?'disabled':''} onclick="execSpot(false,'SELL')">매도 실행</button><button class="btn green" ${(l.sellValue<=0&&l.buyValue<=0)?'disabled':''} onclick="execSpot(true)">AI 실행</button></div><p class="meta">매도 대기금액이 0원이면 매수 버튼은 회색 처리되고 참여금도 0원으로 시작합니다.</p>`}
if(type==='future'){let def=amountDefaultFor('LONG');body=`${common}${liqInfo}<div class="formgrid"><div class="field"><label>증거금</label><input id="gAmount" type="number" value="${def}"></div><div class="field"><label>레버리지</label><select id="gLev">${[2,3,5,10,20,30,50].map(x=>`<option value="${x}">${x}x</option>`).join('')}</select></div></div><div class="actions"><button class="btn primary" ${l.sellValue<=0?'disabled':''} onclick="openFuture(false,'LONG')">Long 오픈</button><button class="btn red" ${l.buyValue<=0?'disabled':''} onclick="openFuture(false,'SHORT')">Short 오픈</button><button class="btn green" ${(l.sellValue<=0&&l.buyValue<=0)?'disabled':''} onclick="openFuture(true)">AI 실행</button></div>${futureOpenList()}`}
if(type==='round')body=`${common}<div class="formgrid"><div class="field"><label>참여금</label><input id="gAmount" type="number" value="${Math.min(user().cash,1000000)}"></div><div class="field"><label>예측</label><select id="gSide"><option value="UP">상승</option><option value="DOWN">하락</option></select></div></div><div class="actions"><button class="btn primary" onclick="openTimedGame('round',false)">참여</button><button class="btn green" onclick="openTimedGame('round',true)">AI 실행</button></div><p class="meta">현재 선택 코인 기준으로 ${S.settings.roundSec}초마다 실시간 판정판에 상승/하락 결과가 표시됩니다. 배당 ${S.settings.roundPayout}배</p>`;

function closeGame(){document.getElementById('gameModal').style.display='none';openGame=null}
function amount(){return Math.floor(+document.getElementById('gAmount')?.value||0)}function side(){return document.getElementById('gSide')?.value}
function ensureCash(a){if(user().cash<a){actionNotice('실행 실패','보유금이 부족합니다.','red');return false}return true}
function execSpot(ai=false,forcedSide=null){let m=market(),u=user(),a=amount();if(a<=0)return actionNotice('실행 실패','금액을 입력하세요.','red');let start=aiScore();let s=forcedSide||(ai?((start>=55&&canTake('BUY',m.symbol))?'BUY':(start<=45&&canTake('SELL',m.symbol))?'SELL':canTake('BUY',m.symbol)?'BUY':'SELL'):side());if(!canTake(s,m.symbol))return actionNotice('실행 실패',s==='BUY'?'매도 대기금액이 없어 매수할 수 없습니다.':'매수 대기금액이 없어 매도할 수 없습니다.','red');let limit=liquidityLimit(s,m.symbol);if(a>limit)return actionNotice('실행 실패','현재 호가 대기금액보다 주문금액이 큽니다. 최대 '+KRW(limit)+' 까지 가능합니다.','red');let hold=u.holdings[m.symbol]||{qty:0,avg:0};let pnl=0;if(s==='BUY'){if(!ensureCash(a))return;let fee=a*S.settings.fee,net=a-fee,qty=net/m.price;updateCash(-a);useLiquidity('BUY',a,m.symbol);let newQty=hold.qty+qty,avg=((hold.qty*hold.avg)+net)/newQty;u.holdings[m.symbol]={qty:newQty,avg};addLog({kind:'현물',mode:ai?'AI현물':'직접현물',symbol:m.symbol,direction:'매수',amount:a,entryPrice:m.price,exitPrice:m.price,scoreStart:start,scoreEnd:aiScore(),result:'체결',pnl:-fee,cashAfter:u.cash})}else{let maxValue=hold.qty*m.price;if(maxValue<a)return actionNotice('실행 실패','보유 코인 수량이 부족합니다.','red');let qty=a/m.price,fee=a*S.settings.fee,proceeds=a-fee;hold.qty-=qty;pnl=proceeds-(hold.avg*qty);updateCash(proceeds);useLiquidity('SELL',a,m.symbol);if(hold.qty<=0.00000001)delete u.holdings[m.symbol];else u.holdings[m.symbol]=hold;addLog({kind:'현물',mode:ai?'AI현물':'직접현물',symbol:m.symbol,direction:'매도',amount:a,entryPrice:hold.avg,exitPrice:m.price,scoreStart:start,scoreEnd:aiScore(),result:pnl>=0?'수익':'손실',pnl,cashAfter:u.cash})}S.gameVolumes.spot+=a;save();actionNotice((ai?'AI ':'')+(s==='BUY'?'매수':'매도')+' 완료',`${m.symbol} ${s==='BUY'?'매수':'매도'} ${KRW(a)} 체결 · 현재 보유금 ${KRW(u.cash)}`,'green');if(openGame==='spot')openGameModal('spot');renderSoft()}
function openFuture(ai=false,forcedDir=null){let m=market(),u=user(),a=amount(),lev=+(document.getElementById('gLev')?.value||5);if(a<=0)return actionNotice('실행 실패','증거금을 입력하세요.','red');let start=aiScore();let dir=forcedDir||(ai?((start>=50&&canTake('LONG',m.symbol))?'LONG':(start<50&&canTake('SHORT',m.symbol))?'SHORT':canTake('LONG',m.symbol)?'LONG':'SHORT'):side());if(!canTake(dir,m.symbol))return actionNotice('실행 실패',dir==='LONG'?'매도 대기금액이 없어 Long 진입이 불가능합니다.':'매수 대기금액이 없어 Short 진입이 불가능합니다.','red');let limit=liquidityLimit(dir,m.symbol);if(a>limit)return actionNotice('실행 실패','현재 호가 대기금액보다 증거금이 큽니다. 최대 '+KRW(limit)+' 까지 가능합니다.','red');if(!ensureCash(a))return;updateCash(-a);useLiquidity(dir,a,m.symbol);let pos={id:UID('pos'),userId:u.id,symbol:m.symbol,direction:dir,margin:a,lev,entry:m.price,openedAt:Date.now(),scoreStart:start,ai,mode:ai?'AI선물':'직접선물'};S.positions.unshift(pos);S.gameVolumes.future+=a;addLog({kind:'선물오픈',mode:pos.mode,symbol:m.symbol,direction:dir,amount:a,entryPrice:m.price,exitPrice:'-',scoreStart:start,scoreEnd:'-',result:'진행',pnl:0,cashAfter:u.cash,positionId:pos.id});save();actionNotice('포지션 오픈 완료',`${m.symbol} ${dir} ${lev}x · 증거금 ${KRW(a)} · 현재 보유금 ${KRW(u.cash)}`,'green');if(openGame==='future')openGameModal('future');renderSoft()}
function futurePnl(p){let m=market(p.symbol);let pct=(m.price-p.entry)/p.entry;if(p.direction==='SHORT')pct=-pct;return p.margin*p.lev*pct}
function closeFuture(id,force=false){let p=S.positions.find(x=>x.id===id);if(!p)return;let pnl=futurePnl(p),ret=force?0:Math.max(0,p.margin+pnl);updateCash(ret);S.positions=S.positions.filter(x=>x.id!==id);addLog({kind:'선물종료',mode:p.mode,symbol:p.symbol,direction:p.direction,amount:p.margin,leverage:p.lev,entryPrice:p.entry,exitPrice:market(p.symbol).price,scoreStart:p.scoreStart,scoreEnd:aiScore(p.symbol),result:force?'청산':pnl>=0?'수익':'손실',pnl:force?-p.margin:pnl,cashAfter:user().cash,positionId:p.id});save();actionNotice(force?'강제청산':'포지션 종료',`${p.symbol} ${p.direction} 종료 · 손익 ${KRW(force?-p.margin:pnl)} · 현재 보유금 ${KRW(user().cash)}`,force?'red':(pnl>=0?'green':'amber'));if(openGame==='future')openGameModal('future');renderSoft()}
function futureOpenList(){let rows=S.positions.filter(p=>p.userId===user().id&&p.margin&&p.lev);if(!rows.length)return '<div class="empty" style="margin-top:14px">진행 중 포지션이 없습니다.</div>';return `<div class="section"><h3>진행 중 포지션</h3><div class="tablewrap"><table class="table"><thead><tr><th>코인</th><th>방향</th><th>레버리지</th><th>손익</th><th>관리</th></tr></thead><tbody>${rows.map(p=>`<tr><td>${p.symbol}</td><td>${p.direction}</td><td>${p.lev}x</td><td class="${futurePnl(p)>=0?'up':'down'}">${KRW(futurePnl(p))}</td><td><button class="btn small" onclick="closeFuture('${p.id}')">종료</button></td></tr>`).join('')}</tbody></table></div></div>`}
function settleFuturesRisk(){S.positions.slice().forEach(p=>{let pnl=futurePnl(p);if(pnl<=-p.margin*S.settings.liqRate)closeFuture(p.id,true)})}
function openTimedGame(kind,ai=false){let m=market(),u=user(),a=amount();if(a<=0)return actionNotice('실행 실패','금액을 입력하세요.','red');if(!ensureCash(a))return;let start=aiScore();let s=ai?aiChoice(kind,start):side();updateCash(-a);let sec=kind==='round'?S.settings.roundSec:kind==='speed'?S.settings.speedSec:S.settings.boxSec;let payout=kind==='round'?S.settings.roundPayout:kind==='speed'?S.settings.speedPayout:S.settings.boxPayout;let g={id:UID('game'),kind,mode:ai?'AI'+gameName(kind):gameName(kind),userId:u.id,symbol:m.symbol,direction:s,amount:a,entry:m.price,scoreStart:start,scoreEnd:null,payout,expires:Date.now()+sec*1000,result:'진행',settled:false,lower:m.price*.9955,upper:m.price*1.0045,breached:false};S.positions.unshift(g);S.gameVolumes[kind]+=a;addLog({kind:gameName(kind)+'참여',mode:g.mode,symbol:m.symbol,direction:s,amount:a,entryPrice:m.price,exitPrice:'-',scoreStart:start,scoreEnd:'-',result:'진행',pnl:0,cashAfter:u.cash,positionId:g.id});save();actionNotice((ai?'AI ':'')+gameName(kind)+' 참여 완료',`${m.symbol} 기준 · 예측 ${s} · 참여금 ${KRW(a)} · 마감 후 결과가 내역과 실시간 판정에 표시됩니다.`,'green');closeGame();renderSoft()}
function aiChoice(kind,score){if(kind==='box')return score>68||score<32?'OUT':'IN';return score>=50?'UP':'DOWN'}function gameName(k){return{round:'회차',speed:'스피드',box:'박스'}[k]||k}
function settleGames(){let now=Date.now();S.positions.slice().forEach(g=>{if(!g.expires||g.settled)return;let m=market(g.symbol);if(g.kind==='box'&&(m.price<g.lower||m.price>g.upper))g.breached=true;if(now<g.expires)return;let win=false;if(g.kind==='round'||g.kind==='speed')win=(g.direction==='UP'&&m.price>g.entry)||(g.direction==='DOWN'&&m.price<g.entry);if(g.kind==='box')win=(g.direction==='IN'&&!g.breached)||(g.direction==='OUT'&&g.breached);let gross=win?g.amount*g.payout:0,pnl=win?gross-g.amount:-g.amount;if(win)updateCash(gross);g.settled=true;S.positions=S.positions.filter(x=>x.id!==g.id);addLog({kind:gameName(g.kind)+'결과',mode:g.mode,symbol:g.symbol,direction:g.direction,amount:g.amount,entryPrice:g.entry,exitPrice:m.price,scoreStart:g.scoreStart,scoreEnd:aiScore(g.symbol),result:win?'성공':'실패',pnl,cashAfter:user().cash,positionId:g.id});if(g.userId===user().id)actionNotice(gameName(g.kind)+' 결과 '+(win?'성공':'실패'),`${g.symbol} ${g.direction} · 손익 ${KRW(pnl)} · 현재 보유금 ${KRW(user().cash)}`,win?'green':'red');})}

function stakeElapsedDays(st){return Math.max(0,(Date.now()-(st.startedAt||Date.now()))/86400000)}
function stakeReward(st,fromLast=false){let base=fromLast?(st.lastClaimAt||st.startedAt):st.startedAt;let days=Math.max(0,(Date.now()-base)/86400000);return (Number(st.amount)||0)*(Number(st.apr)||0)/100/365*days}
function stakeSummary(u){let arr=u.stakes||[];let principal=arr.reduce((a,s)=>a+(+s.amount||0),0);let reward=arr.reduce((a,s)=>a+stakeReward(s,true),0);let avg=principal?arr.reduce((a,s)=>a+(+s.amount||0)*(+s.apr||0),0)/principal:0;return{count:arr.length,principal,reward,avg}}
function renderStaking(){let u=user(),sum=stakeSummary(u);document.getElementById('root').innerHTML=`<section class="stake-hero"><span class="pill green">고퀄리티 스테이킹 데모</span><h1>보유금을 예치하고 시간에 따라 보상을 받는 스테이킹</h1><p class="muted" style="line-height:1.7;max-width:900px">실제 블록체인 예치가 아닌 데모용 기능입니다. 신청 시 가상 보유금이 차감되고, 보상은 APR과 경과시간 기준으로 실시간 계산됩니다. 해지 또는 보상수령 시 가상 보유금에 반영됩니다.</p><div class="actions"><button class="btn primary" onclick="document.getElementById('stakeProducts').scrollIntoView({block:'start'})">상품 선택</button><button class="btn" onclick="document.getElementById('myStakes').scrollIntoView({block:'start'})">내 예치 보기</button></div></section><section class="section asset-strip"><div class="card stat"><span>가상 보유금</span><b>${KRW(u.cash)}</b></div><div class="card stat"><span>예치 원금</span><b>${KRW(sum.principal)}</b></div><div class="card stat"><span>미수령 보상</span><b class="up">${KRW(sum.reward)}</b></div><div class="card stat"><span>평균 APR</span><b>${sum.avg.toFixed(2)}%</b></div></section><section class="section" id="stakeProducts"><div class="head"><div><h2>스테이킹 상품</h2><small>관리자에서 상품을 추가/삭제할 수 있습니다.</small></div></div><div class="stake-products">${S.stakingProducts.map(stakeProductCard).join('')}</div></section><section class="section card" id="myStakes"><div class="head"><div><h2>내 스테이킹 현황</h2><small>보상 수령과 해지가 실제 가상 보유금에 반영됩니다.</small></div></div>${stakeTable(u)}</section>`}
function stakeProductCard(p){let disabled=p.status!=='신청가능';return `<div class="stake-card"><div class="split"><span class="stake-chip">${esc(p.badge||'상품')}</span><span class="pill ${disabled?'gray':'green'}">${esc(p.status)}</span></div><h3 style="margin:14px 0 4px">${esc(p.name)}</h3><div class="meta">${esc(p.symbol)} · 최소 ${KRW(p.min)} · 잠금 ${p.lockDays}일</div><div class="stake-apr">${Number(p.apr).toFixed(2)}%</div><div class="meta">연 환산 APR · 데모 보상 실시간 계산</div><div class="field" style="margin-top:14px"><label>예치금액</label><input id="stakeAmt_${p.id}" type="number" value="${p.min}"></div><div class="actions"><button class="btn primary block" ${disabled?'disabled':''} onclick="applyStake('${p.id}')">스테이킹 신청</button></div></div>`}
function stakeTable(u){let arr=u.stakes||[];if(!arr.length)return '<div class="empty">아직 스테이킹 신청 내역이 없습니다.</div>';return `<div class="tablewrap"><table class="table stake-table"><thead><tr><th>상품</th><th>원금</th><th>APR</th><th>잠금</th><th>경과</th><th>미수령 보상</th><th>상태</th><th>관리</th></tr></thead><tbody>${arr.map(st=>{let left=Math.max(0,Math.ceil((st.startedAt+st.lockDays*86400000-Date.now())/86400000));let reward=stakeReward(st,true);return `<tr><td>${esc(st.name)}<div class="meta">${esc(st.symbol)} · ${esc(new Date(st.startedAt).toLocaleString('ko-KR'))}</div></td><td>${KRW(st.amount)}</td><td>${Number(st.apr).toFixed(2)}%</td><td>${st.lockDays}일</td><td>${stakeElapsedDays(st).toFixed(2)}일</td><td class="up">${KRW(reward)}</td><td><span class="pill ${left>0?'amber':'green'}">${left>0?'잠금 '+left+'일':'해지가능'}</span></td><td><button class="btn small green" onclick="claimStake('${st.id}')">보상수령</button> <button class="btn small red" onclick="unstake('${st.id}')">해지</button></td></tr>`}).join('')}</tbody></table></div>`}
function applyStake(pid){let p=S.stakingProducts.find(x=>x.id===pid),u=user();if(!p)return;let amount=Math.floor(+document.getElementById('stakeAmt_'+pid).value||0);if(amount<p.min)return actionNotice('스테이킹 실패','최소 예치금액은 '+KRW(p.min)+'입니다.','red');if(u.cash<amount)return actionNotice('스테이킹 실패','가상 보유금이 부족합니다.','red');u.cash-=amount;u.stakes=u.stakes||[];let st={id:UID('stake'),productId:p.id,symbol:p.symbol,name:p.name,amount,apr:p.apr,lockDays:p.lockDays,startedAt:Date.now(),lastClaimAt:Date.now(),status:'진행'};u.stakes.unshift(st);addLog({mode:'스테이킹 신청',kind:'STAKE',symbol:p.symbol,direction:'예치',amount,entryPrice:'-',exitPrice:'-',result:'체결',pnl:0,scoreStart:'-',scoreEnd:'-'});actionNotice('스테이킹 신청 완료',p.name+' '+KRW(amount)+' 예치 완료','green');save();renderStaking()}
function claimStake(id){let u=user(),st=(u.stakes||[]).find(x=>x.id===id);if(!st)return;let reward=Math.floor(stakeReward(st,true));if(reward<=0)return actionNotice('수령할 보상 없음','조금 더 시간이 지난 뒤 다시 확인하세요.','amber');u.cash+=reward;st.lastClaimAt=Date.now();addLog({mode:'스테이킹 보상',kind:'STAKE',symbol:st.symbol,direction:'보상수령',amount:0,entryPrice:'-',exitPrice:'-',result:'체결',pnl:reward,scoreStart:'-',scoreEnd:'-'});actionNotice('보상 수령 완료',KRW(reward)+'가 가상 보유금에 반영되었습니다.','green');save();renderStaking()}
function unstake(id){let u=user(),idx=(u.stakes||[]).findIndex(x=>x.id===id);if(idx<0)return;let st=u.stakes[idx];let reward=Math.floor(stakeReward(st,true));let total=(+st.amount||0)+reward;u.cash+=total;u.stakes.splice(idx,1);addLog({mode:'스테이킹 해지',kind:'STAKE',symbol:st.symbol,direction:'해지',amount:st.amount,entryPrice:'-',exitPrice:'-',result:'체결',pnl:reward,scoreStart:'-',scoreEnd:'-'});actionNotice('스테이킹 해지 완료','원금 '+KRW(st.amount)+' + 보상 '+KRW(reward)+' 반영','green');save();renderStaking()}
function renderHistory(){let logs=S.logs.filter(x=>x.userId===user().id);document.getElementById('root').innerHTML=`<section class="card"><div class="head"><div><h2>내역</h2><small>내가 실제 실행한 거래/게임만 표시됩니다. AI 실행은 AI결과로 점수 시작/종료를 함께 표시합니다.</small></div><span class="pill green">현재 보유금 ${KRW(user().cash)}</span></div>${logs.length?historyTable(logs):'<div class="empty">아직 내역이 없습니다.</div>'}</section><section class="section card"><div class="head"><div><h2>AI결과</h2><small>AI 게임 클릭 시 시작 AI점수와 마감 AI점수, 손익을 확인합니다.</small></div></div>${aiResultTable(logs.filter(x=>String(x.mode||'').startsWith('AI')))}</section>`}
function historyTable(rows){return `<div class="tablewrap"><table class="table"><thead><tr><th>시간</th><th>구분</th><th>코인</th><th>방향</th><th>금액</th><th>진입/종료</th><th>결과</th><th>손익</th><th>보유금</th></tr></thead><tbody>${rows.map(l=>{let ep=(l.entryPrice===undefined||l.entryPrice==='-')?'-':N(l.entryPrice);let xp=(l.exitPrice===undefined||l.exitPrice==='-')?'-':N(l.exitPrice);let ok=l.result==='성공'||l.result==='수익'||l.result==='체결';return `<tr><td>${esc(l.time)}</td><td>${esc(l.mode||l.kind||'-')}</td><td>${esc(l.symbol||'-')}</td><td>${esc(l.direction||'-')}</td><td>${KRW(l.amount||0)}</td><td>${ep} / ${xp}</td><td><span class="pill ${ok?'green':l.result==='진행'?'amber':'red'}">${esc(l.result||'-')}</span></td><td class="${(+l.pnl||0)>=0?'up':'down'}">${KRW(l.pnl||0)}</td><td>${KRW(l.cashAfter||0)}</td></tr>`}).join('')}</tbody></table></div>`}
function aiResultTable(rows){if(!rows.length)return '<div class="empty">AI 실행 결과가 없습니다.</div>';return `<div class="tablewrap"><table class="table"><thead><tr><th>시간</th><th>AI게임</th><th>코인</th><th>방향</th><th>시작점수</th><th>마감점수</th><th>결과</th><th>손익</th></tr></thead><tbody>${rows.map(l=>`<tr><td>${esc(l.time)}</td><td>${esc(l.mode)}</td><td>${esc(l.symbol)}</td><td>${esc(l.direction)}</td><td><span class="pill">${esc(l.scoreStart)}점</span></td><td><span class="pill ${l.scoreEnd==='-'?'gray':(+l.scoreEnd>=55?'green':+l.scoreEnd<=45?'red':'gray')}">${esc(l.scoreEnd)}${l.scoreEnd==='-'?'':'점'}</span></td><td>${esc(l.result)}</td><td class="${(+l.pnl||0)>=0?'up':'down'}">${KRW(l.pnl)}</td></tr>`).join('')}</tbody></table></div>`}
function renderAdmin(){document.getElementById('root').innerHTML=`<section class="adminlayout"><aside class="adminmenu">${[['dash','대시보드'],['markets','코인/시세'],['users','회원/잔고'],['game','게임설정'],['staking','스테이킹'],['notice','공지'],['logs','내역관리']].map(x=>`<button class="${adminTab===x[0]?'active':''}" onclick="adminTab='${x[0]}';renderAdmin()">${x[1]}</button>`).join('')}</aside><div>${adminContent()}</div></section>`}
function adminContent(){if(adminTab==='markets')return adminMarkets();if(adminTab==='users')return adminUsers();if(adminTab==='game')return adminGame();if(adminTab==='staking')return adminStaking();if(adminTab==='notice')return adminNotice();if(adminTab==='logs')return adminLogs();return `<div class="card"><div class="head"><h2>관리자 대시보드</h2><small>접속/데이터 메뉴는 삭제했습니다.</small></div><div class="grid g4"><div class="card stat"><span>코인</span><b>${S.markets.length}</b></div><div class="card stat"><span>회원</span><b>${S.users.length}</b></div><div class="card stat"><span>내역</span><b>${S.logs.length}</b></div><div class="card stat"><span>진행포지션</span><b>${S.positions.length}</b></div></div></div>`}

function inputSet(label,key,val){return `<div class="field"><label>${label}</label><input id="set_${key}" value="${val}"></div>`}function saveSettings(){Object.keys(S.settings).forEach(k=>{let e=document.getElementById('set_'+k);if(e)S.settings[k]=+e.value});save();toast('설정 저장 완료')}

function adminStaking(){return `<div class="card"><div class="head"><div><h2>스테이킹 상품 관리</h2><small>데모용 예치상품을 추가/삭제합니다.</small></div></div><div class="formgrid"><div class="field"><label>상품명</label><input id="spName" value="신규 스테이킹 상품"></div><div class="field"><label>코인 심볼</label><input id="spSym" value="BTC"></div><div class="field"><label>APR(%)</label><input id="spApr" type="number" value="5.5"></div><div class="field"><label>잠금일</label><input id="spLock" type="number" value="7"></div><div class="field"><label>최소 예치금</label><input id="spMin" type="number" value="50000"></div><div class="field"><label>뱃지</label><input id="spBadge" value="신규"></div></div><div class="actions"><button class="btn primary" onclick="addStakeProduct()">상품 추가</button><button class="btn" onclick="go('staking')">스테이킹 화면 보기</button></div><br>${stakeProductAdminTable()}<section class="section"><h2>전체 회원 예치 현황</h2><br>${stakeAdminUserTable()}</section></div>`}
function stakeProductAdminTable(){return `<div class="tablewrap"><table class="table"><thead><tr><th>상품</th><th>심볼</th><th>APR</th><th>잠금</th><th>최소금액</th><th>관리</th></tr></thead><tbody>${S.stakingProducts.map(p=>`<tr><td>${esc(p.name)}<div class="meta">${esc(p.badge||'')}</div></td><td>${esc(p.symbol)}</td><td>${p.apr}%</td><td>${p.lockDays}일</td><td>${KRW(p.min)}</td><td><button class="btn small red" onclick="deleteStakeProduct('${p.id}')">삭제</button></td></tr>`).join('')}</tbody></table></div>`}
function stakeAdminUserTable(){let rows=[];S.users.forEach(u=>(u.stakes||[]).forEach(st=>rows.push({u,st})));if(!rows.length)return '<div class="empty">회원 예치 내역이 없습니다.</div>';return `<div class="tablewrap"><table class="table"><thead><tr><th>회원</th><th>상품</th><th>원금</th><th>보상</th><th>상태</th></tr></thead><tbody>${rows.map(({u,st})=>`<tr><td>${esc(u.name)}</td><td>${esc(st.name)}<div class="meta">${esc(st.symbol)}</div></td><td>${KRW(st.amount)}</td><td class="up">${KRW(stakeReward(st,true))}</td><td><span class="pill green">진행</span></td></tr>`).join('')}</tbody></table></div>`}
function addStakeProduct(){let name=document.getElementById('spName').value.trim(),symbol=document.getElementById('spSym').value.trim().toUpperCase();if(!name||!symbol)return;S.stakingProducts.unshift({id:UID('sp'),symbol,name,apr:+document.getElementById('spApr').value||0,lockDays:+document.getElementById('spLock').value||0,min:+document.getElementById('spMin').value||0,status:'신청가능',badge:document.getElementById('spBadge').value||'상품'});save();renderAdmin()}
function deleteStakeProduct(id){if(!confirm('스테이킹 상품을 삭제할까요? 이미 신청된 내역은 유지됩니다.'))return;S.stakingProducts=S.stakingProducts.filter(p=>p.id!==id);save();renderAdmin()}
function adminNotice(){return `<div class="card"><div class="head"><h2>공지</h2></div><div class="formgrid"><div class="field"><label>제목</label><input id="noTitle"></div><div class="field"><label>내용</label><input id="noBody"></div></div><div class="actions"><button class="btn primary" onclick="S.notices.unshift({id:UID('no'),title:document.getElementById('noTitle').value,body:document.getElementById('noBody').value});save();renderAdmin()">공지 추가</button></div><br>${S.notices.map(n=>`<div class="card" style="box-shadow:none;margin-bottom:8px"><b>${esc(n.title)}</b><p class="meta">${esc(n.body)}</p></div>`).join('')}</div>`}
function adminLogs(){return `<div class="card"><div class="head"><div><h2>내역관리</h2><small>전체 회원 내역</small></div><button class="btn red" onclick="if(confirm('전체 내역 삭제?')){S.logs=[];S.positions=[];save();renderAdmin()}">전체 내역 삭제</button></div>${S.logs.length?historyTable(S.logs):'<div class="empty">내역 없음</div>'}</div>`}
route=location.hash.replace('#','')||'home';if(sessionStorage.getItem('wsdemo')==='ok')render();
</script>
</body>
</html>
